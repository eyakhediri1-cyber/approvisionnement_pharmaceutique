# ── Serveur ───────────────────────────────────────────────────────────────────
server.port=8080

# ── Base de données (Pharmacie – port 8080) ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/pharmacie_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=pharmaApprovisionnementSecretKey2024VeryLongAndSecure!@#$%
jwt.expiration=86400000

# ── Grossiste par défaut (overridé par chaque profil) ─────────────────────────
app.default-grossiste=Pharmacie

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.pharma=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true